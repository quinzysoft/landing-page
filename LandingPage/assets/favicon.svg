<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="QuinzySoft favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle border with accent gradient -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none"
        stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Monogram: < / > -->
  <g transform="translate(32, 32)" text-anchor="middle"
     font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
     font-weight="700" font-size="22" fill="url(#accent)">
    <text x="0" y="6">&lt;/&gt;</text>
  </g>
</svg>
